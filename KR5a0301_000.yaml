front:
  text: 稱星靈臺祕要經
  hash: sha256:6063d516832b4eba7059381587453fac0fd76788742b6a23dec7e3983ddebe0e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0301_HFL_000-001a, image: hfl/0136/0136-176.png}
body:
  text: 明五行之性各異木性強直火性猛烈土性仁和金怯嚴毅水性謙退禳災星法人倫經云申酉為八殺位此位唯不冝見火郭景純以火在西沒故知不令終因以法禳先須淨修一厠常須焚香勿令人往只自巳如之作法時即須披頭仗劔立此厠間如一頃刻不逢人即置劒於厠中可以禳之若人見之則彼此不免也其時被桓玄見之璞曰與爾俱不免也後果如其言其法不欲匿之袐如金匱經後一行與李筌撰筆斯經卷內收之余恐師巫以為取資之具乾寧中勘其疏巳去之更不備載今復慮年紀綿邈流落其本故别録之禳法候火星行度來到元守宫分度一如生時遠近度數合於何日符同遂先絶嗜欲自晨居靜室早飯了至日午可裸形仗劎入厠作法了低聲哭出厠門却入靜室澡浴卧一時看夢寐所見何物必去其禍也可二度為之也若恍惚與人為官災疾病者冝用柏木刻如自巳之形狀披以巳之衣服候火星見自巳披髮仗劔呼巳名唱柏木形星下連呼僕妾以火熒之然後入靜室端坐存身破財施貧濟乏行隂德其木人長三尺二寸其工匠多與錢物勿令泄於外人其衣服象木人長短為之忌僧尼雞犬見之若土到元守為災必若第一度到父母妻子疾病死亡失財貴人則坐致流亡但看生時得力與不得力若星主得力則先吉後災也禳法其法與火同若年下為災及元守者以巳之冠冕衣服令入木竹林下候為災日月倩人作一竹人形架其衣服冠冕向其星辰下如值隂雨即向厠上作人之形呼巳名斷其竹木投諸厠中可去其災亦忌人見之見則不免也禳火出九執經使赤油麻七粒赤稻五粒赤小豆三粒赤驉尾七莖赤銅屑少許以緋袋子盛緋線子繫在臂上大吉又若畫其形供養吉又轉度人經及消災經及帶緋頭鬚朱砂即終雲漢日為之寶命經云乘赤馬著赤衣在身須七處刺出血又剌出赤驢血當火見日為災時造八角壇於四面四角頭各著四方箭箭上繫四方色續時巳身上血并赤驢血與擅末相調瀝於壇上上又以赤油麻油燈五方五盞燈樹皆須赤前來所用袋用緋索子繫在臂上帶頭鬚吉又九執經云取隨年五果木柴隨年甘草兩數井前功德焚之左臂上帶赤銅釧南壇下置水一甕午上立竿懸赤旙埋赤炭六斤禳土法取黑油麻七粒黑豆七粒以皂綾袋子盛之用皂索子繫左臂上能除一切鬼魅邪魔咒詛之災終朔日以黑油麻汁作粥自食少許餘以施貧人及道僧緑土管一切修道人及苦行求正之者布施則大吉不得傷害孝子及老人不冝多作樂緣土好哀哭不好音樂故也又九執經云冝以犂具鏵鐡鑄作一土星真形長七寸以黑磁甕盛之置於卧床頭安之每於雞緩直日平旦時以黑油麻汁瀝頭上經年乃去之如畫之供養亦得以隨年果子供養帶黑色者尤妙咒曰雞緩是我君主某臣僕願加祐護次以度災厄然後拜之供養訖自巳食之好食酸苦等冝看八陽經帶雄朱燒安息香著皂衣不入惡神廟忌食牛肉忌角器等禳暗曜經云以屠宰煞鐡打作釧如蛇形以口銜尾帶立臂上著緋衣忌夜食及黑處行取髙岡上土一斗置床下别取黃土一斗煮熟送銀長生鵝鴨食之大吉禳木法取白猪毛七莖以白袋盛繫左臂上忌食猪肉不得殺生命又以白銀一雨鑄作真形供養看經不得入神廟及吊死問病供養一切道人古洞徹限歌人生貴賤稟星推限數交宫各有時若遇羅睺金木曜太陽紫氣月同隨限逢此曜加官祿限數若逢金木日月紫氣羅㬋主喜慶之事火土二星到便危夜降土星𧗊火曜三方不是死無疑夜生人土不是主晝生人火不是主限數若逢立主死此星若是三方主雖有災傷命不離如夜生土是主晝生火是主限數若逢雖有災難而不至死家宅不寧因孛至更兼鈍悶恰如癡限數逢著月孛主家宅不寧身心純悶計都失職人須記若過奎婁主轉移若遇計都在雙魚壁宿之時限數若逢主有遷官之喜為在好廟之宿若只在室奎二宿主喜慶為好廟即不及在壁婁二宿也首在陽宫為福緊尾星隂位定災稀羅睺在陽宫為福緊在隂宮為福慢計都在隂宮為福緊在陽宮為福慢宮中對視三方淨空限凡營事不期若人限逢看正入并三合對照無星為是在空限主其鈍悶為事不決官祿上逢空限死四旬六七命須辭若官祿上逢之時即遇五十不得應在四十六七也善星限內逢災忌稱意中亡此是機若人限數逢好星之數有忌星此人在稱意之中只有災星消息定若是好限中逢著災星不是忌主其福壽不定消息詳之剝官孛計限仍知惡曜相參各有時運上逢之何月死失職中亡請細思若人限數逢著月孛計都之數內有忌星合照此人失職之中亡也晝土夜熒如是主限逢稱遂轉官資火隂陽土宮尤妙缺文星相見職昌位顯主麻詞若人限逢紫氣尤勝他星主領靖緊之權一限兩星居好廟益壽四年人要知若一限之中見兩惡曜在好樂合廷二年之數即延得四年也凡定災福若是逢遲還福慢順行還福緊惡曜留逆為災緊順行即慢限逢惡曜兩相見為災至甚並無移若是一限之中見兩惡星為災甚豐他皆倣此也初入忌星官宿限身命行年惡曜隨留逆之月為亡月官為五弱不須疑若是初入忌星行年身命又逢忌星臨照及在弱宫此忌留逆之月必身亡更不待第二年是災甚也限惡行年身命喜好星過時便見危星辰本官勝餘位七強宮內福加之五弱添災福力滅學者須詳善惡推此書如後更無妙先賢指定更無迷生死定人無一失方顯從來學洞微洞微大數休咎歌卯十五兮辰宮十巳十一兮酉同式午官十五最髙強申七未八却在詳戌亥子各四年半丑寅都各五年強假今晝生火在巳午未申酉並空亡二十五年為盡處不然破敗在他鄉木在午兮酉上火三旬之七福堂堂蝎在酉前申位盡六句之六是為殃人生一百以為凖學而細記莫令忘夫人生以一百為準多有星辰善惡加滅其半以此不及一百從命宮從十五年經歷善星得其本宮之數歷惡宮切見相對與三合加減之遇惡即減半喜加半法也稱星靈臺祕要經
